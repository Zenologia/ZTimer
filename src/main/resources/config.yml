# Existing installs are synchronized to this layout on upgrade.
# ZTimer creates a timestamped backup before rewriting a live config.yml.
config_version: 2

storage:
  type: yaml
  yaml:
    file: "ztimer-data.yml"
  sqlite:
    file: "ztimer.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "ztimer"
    user: "ztimer"
    password: "password"
    useSSL: false

leaderboards:
  global_top_n_default: 5
  per_timer:
    maze1: 3

mazes:
  maze1:
    exit_location:
      world: "world"
      x: 100.5
      y: 64.0
      z: 200.5
      yaw: 0.0
      pitch: 0.0

# Timer IDs are defined here.
# If a timer is not listed under timers, commands will reject it.
timers:
  maze1:
    relog-commands:
      - "say RELOG %player% %player_uuid%"
    logout-commands:
      - "say LOGOUT %player% %player_uuid%"

fallback_exit_location:
  enabled: false
  world: "world"
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

formatting:
  time_default: "-"
  time_pattern: "mm:ss"

# Admin and player messages now live in messages.yml.
debug:
  enabled: false
  log_start_stop: true
  log_db_errors: true
